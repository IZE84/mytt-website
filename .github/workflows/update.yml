name: Daten aktualisieren

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Abhängigkeiten installieren
        run: pip install requests
      - name: Daten holen
        env:
          MYTT_EMAIL: ${{ secrets.MYTT_EMAIL }}
          MYTT_PASSWORD: ${{ secrets.MYTT_PASSWORD }}
        run: python fetch_data.py
      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "daten: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
